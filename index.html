<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Mini Brawler</title>

<style>

body{
margin:0;
font-family:Arial;
background:#0f1c2e;
color:white;
overflow:hidden;
}

#lobby{
position:absolute;
width:100%;
height:100%;
background:linear-gradient(#1a2c46,#0b1525);
display:flex;
align-items:center;
justify-content:center;
flex-direction:column;
}

#topbar{
position:absolute;
top:10px;
left:10px;
display:flex;
gap:15px;
}

.currency{
background:#222;
padding:8px 16px;
border-radius:10px;
font-weight:bold;
}

#player{
margin-top:40px;
}

#shelly{
width:180px;
}

#play{
margin-top:20px;
background:#ffd800;
color:black;
font-weight:bold;
border:none;
padding:18px 40px;
font-size:20px;
border-radius:10px;
}

#idbox{
position:absolute;
top:10px;
right:10px;
background:#222;
padding:8px 12px;
border-radius:10px;
font-size:14px;
}

#adminbtn{
position:absolute;
bottom:10px;
right:10px;
background:red;
color:white;
border:none;
padding:10px;
border-radius:10px;
}

#adminmenu{
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
background:#111;
padding:20px;
border-radius:15px;
display:none;
}

#adminmenu button{
margin-top:10px;
width:100%;
padding:10px;
}

#game{
position:absolute;
width:100%;
height:100%;
background:#1a2c46;
display:none;
}

#char{
position:absolute;
width:40px;
height:40px;
background:purple;
border-radius:10px;
}

.bullet{
position:absolute;
width:10px;
height:10px;
background:yellow;
}

</style>
</head>

<body>

<div id="lobby">

<div id="topbar">
<div class="currency">🪙 <span id="coins">100</span></div>
<div class="currency">💎 <span id="gems">25</span></div>
</div>

<div id="idbox">
ID: <span id="playerid"></span>
</div>

<div id="player">
<img src="https://static.wikia.nocookie.net/brawlstars/images/3/3f/Shelly.png" id="shelly">
</div>

<button id="play">PLAY</button>

<button id="adminbtn">ADMIN</button>

</div>


<div id="adminmenu">

<h3>Admin Menu</h3>

<button onclick="addCoins()">+100 Coins</button>
<button onclick="addGems()">+50 Gems</button>
<button onclick="closeAdmin()">Close</button>

</div>


<div id="game">

<div id="char"></div>

</div>

<script>

let coins=localStorage.getItem("coins")||100
let gems=localStorage.getItem("gems")||25

document.getElementById("coins").innerText=coins
document.getElementById("gems").innerText=gems

function save(){
localStorage.setItem("coins",coins)
localStorage.setItem("gems",gems)
}

let id=localStorage.getItem("playerid")

if(!id){
id=Math.floor(Math.random()*999999)
localStorage.setItem("playerid",id)
}

document.getElementById("playerid").innerText=id


document.getElementById("adminbtn").onclick=function(){
let code=prompt("Admin Passwort")

if(code=="1234"){
document.getElementById("adminmenu").style.display="block"
}
}

function closeAdmin(){
document.getElementById("adminmenu").style.display="none"
}

function addCoins(){
coins=parseInt(coins)+100
document.getElementById("coins").innerText=coins
save()
}

function addGems(){
gems=parseInt(gems)+50
document.getElementById("gems").innerText=gems
save()
}


document.getElementById("play").onclick=function(){

document.getElementById("lobby").style.display="none"
document.getElementById("game").style.display="block"

}

let char=document.getElementById("char")

let x=200
let y=200

char.style.left=x+"px"
char.style.top=y+"px"

document.addEventListener("keydown",function(e){

if(e.key=="w")y-=10
if(e.key=="s")y+=10
if(e.key=="a")x-=10
if(e.key=="d")x+=10

char.style.left=x+"px"
char.style.top=y+"px"

})

document.addEventListener("click",function(){

let bullet=document.createElement("div")
bullet.className="bullet"

bullet.style.left=x+15+"px"
bullet.style.top=y+"px"

document.getElementById("game").appendChild(bullet)

let speed=setInterval(function(){

bullet.style.top=(bullet.offsetTop-10)+"px"

if(bullet.offsetTop<0){
bullet.remove()
clearInterval(speed)
}

},20)

})

</script>

</body>
</html>
