<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Mini Brawler Lobby</title>

<style>
body{
margin:0;
font-family:Arial;
background:#0f1c2e;
color:white;
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
height:100vh;
}

#lobby{
width:90vw;
max-width:900px;
height:60vh;
background:linear-gradient(#1a2c46,#0b1525);
border-radius:20px;
position:relative;
overflow:hidden;
}

#player{
position:absolute;
bottom:80px;
left:50%;
transform:translateX(-50%);
width:120px;
height:120px;
background:purple;
border-radius:20px;
display:flex;
align-items:center;
justify-content:center;
font-weight:bold;
}

#play{
position:absolute;
bottom:20px;
right:20px;
background:#ffd800;
color:black;
font-weight:bold;
border:none;
padding:20px 40px;
font-size:20px;
border-radius:10px;
}

#topbar{
position:absolute;
top:10px;
left:10px;
display:flex;
gap:20px;
}

.currency{
background:#222;
padding:10px 20px;
border-radius:12px;
font-weight:bold;
font-size:18px;
}
</style>
</head>

<body>

<div id="lobby">

<div id="topbar">
<div class="currency">🪙 <span id="coins">100</span></div>
<div class="currency">💎 <span id="gems">25</span></div>
</div>

<div id="player">
PLAYER
</div>

<button id="play">PLAY</button>

</div>

</body>
</html>
