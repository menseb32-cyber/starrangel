<!DOCTYPE html>
<html>
<head>

<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Mini Brawler</title>

<style>

body{
margin:0;
background:#1e1e1e;
color:white;
font-family:Arial;
display:flex;
flex-direction:column;
align-items:center;
}

#topbar{
display:flex;
gap:20px;
margin:10px;
}

#game{
width:90vw;
height:50vw;
max-width:900px;
max-height:500px;
background:#2b2b2b;
position:relative;
border-radius:10px;
overflow:hidden;
}

.player{
width:30px;
height:30px;
background:purple;
position:absolute;
border-radius:50%;
}

.bot{
width:30px;
height:30px;
background:red;
position:absolute;
border-radius:50%;
}

.cube{
width:20px;
height:20px;
background:lime;
position:absolute;
}

#adminPanel{
display:none;
background:#111;
padding:10px;
margin-top:10px;
}

</style>
</head>

<body>

<h1>Mini Brawler</h1>

<div id="topbar">

<div>Trophäen: <span id="trophies">0</span></div>
<div>Cubes: <span id="cubes">0</span></div>
<div>Brawl Pass: <span id="brawlpass">Tier 0</span></div>
<div>Player ID: <span id="pid"></span></div>

</div>

<button onclick="startGame()">Start Battle</button>

<div id="game"></div>

<br>

<button onclick="selectSkin('default')">Default Skin</button>
<button onclick="selectSkin('merchant')">Händler Gale</button>

<div id="adminPanel">

<h3>Admin Menü</h3>

<input id="adminCommand" placeholder="/givegems #A1 1000">

<button onclick="runAdminCommand()">Enter</button>

<button onclick="createAdminAccount()">
Neuen Account erstellen
</button>

</div>

<script>

// PLAYER DATA

const playerData={
trophies:0,
cubes:0,
gems:0
}

// BRAWL PASS

const brawlPass={
season:1,
progress:0
}

function winBattle(){

brawlPass.progress++

document.getElementById("brawlpass").innerText="Tier "+brawlPass.progress

}



// PLAYER ID

function generatePlayerID(){

const chars="ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789"

let id="#"

for(let i=0;i<6;i++){
id+=chars[Math.floor(Math.random()*chars.length)]
}

return id
}

let playerID=localStorage.getItem("playerID")

if(!playerID){

playerID=generatePlayerID()

localStorage.setItem("playerID",playerID)

}

document.getElementById("pid").innerText=playerID



// GAME

let player
let bot

function startGame(){

const game=document.getElementById("game")

game.innerHTML=""

player=document.createElement("div")
player.className="player"
player.style.left="50px"
player.style.top="200px"

bot=document.createElement("div")
bot.className="bot"
bot.style.left="500px"
bot.style.top="200px"

game.appendChild(player)
game.appendChild(bot)

spawnCube()

}



// MOVEMENT

document.addEventListener("keydown",function(e){

if(!player)return

let x=parseInt(player.style.left)
let y=parseInt(player.style.top)

if(e.key=="w") y-=10
if(e.key=="s") y+=10
if(e.key=="a") x-=10
if(e.key=="d") x+=10

player.style.left=x+"px"
player.style.top=y+"px"

checkFight()

})



// FIGHT

function checkFight(){

let px=parseInt(player.style.left)
let bx=parseInt(bot.style.left)

if(Math.abs(px-bx)<30){

playerData.trophies+=8

document.getElementById("trophies").innerText=playerData.trophies

alert("Bot besiegt!")

winBattle()

startGame()

}

}



// POWER CUBE

function spawnCube(){

const cube=document.createElement("div")

cube.className="cube"

cube.style.left=Math.random()*500+"px"
cube.style.top=Math.random()*300+"px"

cube.onclick=function(){

playerData.cubes++

document.getElementById("cubes").innerText=playerData.cubes

cube.remove()

}

document.getElementById("game").appendChild(cube)

}



// SKINS

function selectSkin(id){

const player=document.querySelector(".player")

if(!player)return

if(id==="merchant"){
player.style.background="orange"
}else{
player.style.background="purple"
}

}



// ADMINS

const admins=["#A1"]

if(admins.includes(playerID)){
document.getElementById("adminPanel").style.display="block"
}



// PLAYERS DATABASE

const players={

"#A1":{gems:0,skins:[]},
"#B2":{gems:50,skins:[]}

}



// ADMIN COMMANDS

function runAdminCommand(){

const input=document.getElementById("adminCommand").value

const parts=input.split(" ")

const command=parts[0]

if(command==="/givegems"){

const id=parts[1]
const amount=parseInt(parts[2])

if(players[id]){
players[id].gems+=amount
alert(id+" hat jetzt "+players[id].gems+" Gems")
}

}

if(command==="/giveskin"){

const id=parts[1]
const skin=parts[2]

if(players[id]){
players[id].skins.push(skin)
alert(id+" hat Skin "+skin)
}

}

}



// ADMIN ACCOUNT

function createAdminAccount(){

const id=prompt("Neue Player-ID:")

players[id]={

trophies:999000,
gems:999999,
coins:999999,
level:800

}

alert("Account erstellt: "+id)

}

</script>

</body>
</html>
