<!DOCTYPE html>
<html>
<head>

<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Mini Brawler</title>

<style>

body{
margin:0;
background:#1e1e1e;
color:white;
font-family:Arial;
display:flex;
flex-direction:column;
align-items:center;
}

#topbar{
display:flex;
gap:20px;
margin:10px;
}

#game{
width:90vw;
height:50vw;
max-width:900px;
max-height:500px;
background:#2b2b2b;
position:relative;
border-radius:10px;
overflow:hidden;
}

.player{
width:30px;
height:30px;
background:purple;
position:absolute;
border-radius:50%;
}

.bot{
width:30px;
height:30px;
background:red;
position:absolute;
border-radius:50%;
}

.cube{
width:20px;
height:20px;
background:lime;
position:absolute;
}

#adminPanel{
display:none;
background:#111;
padding:10px;
margin-top:10px;
}

</style>
</head>

<body>

<h1>Mini Brawler</h1>

<div id="topbar">

<div>Trophäen: <span id="trophies">0</span></div>
<div>Cubes: <span id="cubes">0</span></div>
<div>Player ID: <span id="pid"></span></div>

</div>

<button onclick="startGame()">
